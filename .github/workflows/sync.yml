name: Sync ima-skill
on:
  schedule:
    - cron: '0 6 */5 * *'     # 每 5 天 UTC 6:00 运行
  workflow_dispatch:           # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 git push 提交 + 创建 Release/标签
    steps:
      # 1. 检出仓库
      - uses: actions/checkout@v5

      # 2. 下载官方 zip
      - name: Download official zip
        run: |
          curl -L -o /tmp/download.zip \
            "https://app-dl.ima.qq.com/skills/ima-skills-1.1.7.zip"

      # 3. SHA256 对比，判断内容是否有变化
      - name: Compare zip hash
        id: hash
        run: |
          NEW_HASH=$(sha256sum /tmp/download.zip | cut -d' ' -f1)
          echo "new_hash=$NEW_HASH"
          if [ -f raw/ima-skills-1.1.7.zip ]; then
            OLD_HASH=$(sha256sum raw/ima-skills-1.1.7.zip | cut -d' ' -f1)
            echo "old_hash=$OLD_HASH"
            if [ "$NEW_HASH" = "$OLD_HASH" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "no changes, skipping"
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # 4. 内容变更时同步文件
      - name: Sync files
        if: steps.hash.outputs.changed == 'true'
        run: |
          # 4a. 更新 raw/ 中的原始 zip
          cp /tmp/download.zip raw/ima-skills-1.1.7.zip

          # 4b. 解压到临时目录
          mkdir -p /tmp/extracted
          unzip -o /tmp/download.zip -d /tmp/extracted/

          # 4c. 使用 rsync 增量更新 skills/ima-skill/ 目录
          #     Claude Code / CCS 约定：skill 必须位于 skills/<name>/ 下
          #     -a: archive mode（保留权限、时间戳等）
          #     --delete: 删除目标中有但源中没有的文件
          #     只复制有差异的文件，避免 git 全量重写
          mkdir -p skills
          rsync -a --delete /tmp/extracted/ima-skill/ ./skills/ima-skill/

      # 5. 提取版本号（从文件名 ima-skills-{version}.zip）
      - name: Extract version
        id: version
        run: |
          FILENAME=$(basename raw/ima-skills-*.zip)
          VERSION=$(echo "$FILENAME" | sed -n 's/^ima-skills-\(.*\)\.zip$/\1/p')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 6. 提交变更到 git
      - name: Commit and push
        if: steps.hash.outputs.changed == 'true'
        run: |
          git config user.name "ima-skill-sync[bot]"
          git config user.email "bot@ima-skill-sync"
          git add -A raw/ skills/
          git diff --cached --quiet || \
            git commit -m "sync ima-skill v${{ steps.version.outputs.version }} ($(date +%Y-%m-%d))"
          git push

      # 7. 创建 GitHub Release
      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || steps.hash.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=v${{ steps.version.outputs.version }}
          ASSET="raw/ima-skills-${{ steps.version.outputs.version }}.zip"
          # 手动触发时无论是否变更都发版；release 已存在则刷新附件，不存在则创建
          if gh release view "$V" >/dev/null 2>&1; then
            echo "Release $V 已存在，刷新附件"
            gh release upload "$V" "$ASSET" --clobber
          else
            gh release create "$V" --title "$V" --notes "" "$ASSET"
          fi
